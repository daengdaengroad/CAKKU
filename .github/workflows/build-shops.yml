name: 전국 시트 복원 업체 DB 생성

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-shops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 업체 DB 생성 (카카오 로컬 API)
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: node server/scripts/build_shops_db.js

      - name: 결과 커밋
        run: |
          git config user.name "cakku-bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/data/shops.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "전국 시트 복원 업체 DB 갱신 (자동 생성)"
            git push
          fi
