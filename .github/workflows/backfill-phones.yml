name: 시트 업체 전화번호 백필

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill-phones:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 전화번호 보강 (구글 Places)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node server/scripts/backfill_phones.js

      - name: 결과 커밋
        run: |
          git config user.name "cakku-bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/data/shops.json
          if git diff --staged --quiet; then
            echo "채운 전화번호 없음 — 커밋 생략"
          else
            git commit -m "시트 업체 전화번호 백필 (구글 Places, 자동)"
            git push
          fi
